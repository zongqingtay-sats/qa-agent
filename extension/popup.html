<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #ffffff;
      color: #1a1a1a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header .icon {
      width: 24px;
      height: 24px;
      background: #6366f1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.connected { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.disconnected { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.running { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status.connected .status-dot { background: #10b981; }
    .status.disconnected .status-dot { background: #ef4444; }
    .status.running .status-dot { background: #3b82f6; animation: pulse 1.5s infinite; }
    .status.failed .status-dot { background: #ef4444; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .info {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
    .info code {
      background: #f3f4f6;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .step-count {
      font-size: 13px;
      color: #374151;
      margin-top: 8px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .current-test {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .current-step {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
      word-break: break-word;
    }
    .controls {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .controls button {
      flex: 1;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      background: #ffffff;
      color: #374151;
      transition: background 0.15s, border-color 0.15s;
    }
    .controls button:hover { background: #f3f4f6; }
    .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
    .controls button.btn-pause { border-color: #f59e0b; color: #92400e; }
    .controls button.btn-pause:hover { background: #fffbeb; }
    .controls button.btn-resume { border-color: #10b981; color: #065f46; }
    .controls button.btn-resume:hover { background: #ecfdf5; }
    .controls button.btn-retry { border-color: #6366f1; color: #4338ca; }
    .controls button.btn-retry:hover { background: #eef2ff; }
    .status.paused { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .status.paused .status-dot { background: #f59e0b; }
    .status.failed { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .error-message {
      font-size: 12px;
      color: #991b1b;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 8px;
      margin-top: 8px;
      word-break: break-word;
      max-height: 80px;
      overflow-y: auto;
    }
    .clickable-id {
      font-size: 11px;
      color: #6366f1;
      font-family: monospace;
      margin-bottom: 2px;
      word-break: break-all;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: transparent;
      transition: text-decoration-color 0.15s;
    }
    .clickable-id:hover {
      text-decoration-color: #6366f1;
    }
    .current-test {
      cursor: pointer;
    }
    .current-test:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">QA</div>
    <h1>QA Agent Test Runner</h1>
  </div>
  
  <div id="status" class="status disconnected">
    <span class="status-dot"></span>
    <span id="status-text">Waiting for connection...</span>
  </div>

  <div id="execution-info" style="display:none">
    <div class="current-test" id="test-name" title="Click to open test run"></div>
    <div class="clickable-id" id="test-id" title="Click to open test case"></div>
    <div class="clickable-id" id="run-id" title="Click to open test run"></div>
    <div class="step-count" id="step-info"></div>
    <div class="current-step" id="current-step-desc"></div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress"></div>
    </div>
    <div class="controls" id="controls">
      <button class="btn-pause" id="btn-pause" title="Pause">⏸ Pause</button>
      <button class="btn-resume" id="btn-resume" title="Resume" disabled>▶ Resume</button>
      <button class="btn-retry" id="btn-retry" title="Retry current step" disabled>↻ Retry</button>
    </div>
    <div class="error-message" id="error-message" style="display:none"></div>
  </div>

  <p class="info" style="margin-top: 12px;">
    Extension ID: <code id="ext-id">—</code>
  </p>
  <p class="info" style="margin-top: 4px;">
    Open your QA Agent web app to start running tests.
  </p>

  <script src="popup.js"></script>
</body>
</html>
