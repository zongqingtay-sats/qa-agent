<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #ffffff;
      color: #1a1a1a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header .icon {
      width: 24px;
      height: 24px;
      background: #6366f1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.connected { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.disconnected { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.running { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status.connected .status-dot { background: #10b981; }
    .status.disconnected .status-dot { background: #ef4444; }
    .status.running .status-dot { background: #3b82f6; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .info {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
    .info code {
      background: #f3f4f6;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .step-count {
      font-size: 13px;
      color: #374151;
      margin-top: 8px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">QA</div>
    <h1>QA Agent Test Runner</h1>
  </div>
  
  <div id="status" class="status disconnected">
    <span class="status-dot"></span>
    <span id="status-text">Waiting for connection...</span>
  </div>

  <div id="execution-info" style="display:none">
    <div class="step-count" id="step-info"></div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress"></div>
    </div>
  </div>

  <p class="info" style="margin-top: 12px;">
    Extension ID: <code id="ext-id">—</code>
  </p>
  <p class="info" style="margin-top: 4px;">
    Open your QA Agent web app to start running tests.
  </p>

  <script src="popup.js"></script>
</body>
</html>
